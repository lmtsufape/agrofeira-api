version: '3.8'

services:
  postgres:
    image: postgres:16
    container_name: ecofeira-db
    environment:
      POSTGRES_DB: ecofeira
      POSTGRES_USER: ecofeira
      POSTGRES_PASSWORD: ecofeira123
    ports:
      - "5432:5432"
    volumes:
      - ecofeira_data:/var/lib/postgresql/data

volumes:
  ecofeira_data: